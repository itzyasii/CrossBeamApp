<script>
        // Simple D-pad emulation for demonstration
        document.addEventListener('keydown', (e) => {
            const focusable = Array.from(document.querySelectorAll('button, [tabindex="0"]'));
            const current = document.activeElement;
            let index = focusable.indexOf(current);

            if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
                index = (index + 1) % focusable.length;
                focusable[index].focus();
            } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
                index = (index - 1 + focusable.length) % focusable.length;
                focusable[index].focus();
            }
        });

        // Initialize focus on the main card
        window.addEventListener('DOMContentLoaded', () => {
            const mainCard = document.querySelector('.beam-focus');
            if (mainCard) mainCard.focus();
        });
    </script>
